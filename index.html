<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>漢字マスター — Kanji Master</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;900&family=Noto+Sans+Hebrew:wght@400;700&display=swap" rel="stylesheet" />
<meta name="theme-color" content="#0f0f14" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a12; --bg2: rgba(22,22,38,0.85); --bg3: rgba(40,40,65,0.7); --bg4: #3a3a5c;
  --amber: #f0a830; --amber-light: #ffd580; --amber-dark: #c48820;
  --green: #4caf50; --red: #ef5350; --orange: #ff9800; --blue: #42a5f5; --purple: #ab47bc;
  --text: #eeeef0; --text2: #a0a0b8; --text3: #6a6a80;
  --radius: 14px; --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.08);
  --glow-amber: 0 0 20px rgba(240,168,48,0.15), 0 0 60px rgba(240,168,48,0.05);
}
[data-theme="light"] {
  --bg: #f0efe8; --bg2: rgba(255,255,255,0.9); --bg3: rgba(200,200,210,0.5); --bg4: #cccccc;
  --text: #1a1a2e; --text2: #555566; --text3: #888899;
  --glass: rgba(255,255,255,0.6); --glass-border: rgba(0,0,0,0.08);
  --glow-amber: 0 0 20px rgba(240,168,48,0.1), 0 0 40px rgba(240,168,48,0.05);
}
html { font-size: 16px; }
body {
  font-family: 'Noto Sans Hebrew', 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(240,168,48,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(171,71,188,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 50% 30% at 10% 60%, rgba(66,165,245,0.05) 0%, transparent 50%);
  background-attachment: fixed;
}
input, select, textarea, button { font-family: inherit; }
button { cursor: pointer; border: none; background: none; color: inherit; }
.jp { font-family: 'Noto Sans JP', sans-serif; direction: ltr; }
.ltr { direction: ltr; text-align: left; }

@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes scaleIn { from { transform:scale(0.9); opacity:0; } to { transform:scale(1); opacity:1; } }
@keyframes flipIn { from { transform:rotateY(90deg); } to { transform:rotateY(0); } }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.15); } }
@keyframes xpFloat { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-60px); } }
@keyframes streak { 0% { transform:scale(1); } 25% { transform:scale(1.3); } 50% { transform:scale(1); } }
.fade-in { animation: fadeIn 0.4s ease-out; }
.scale-in { animation: scaleIn 0.3s ease-out; }
.flip-in { animation: flipIn 0.5s ease-out; }
.pulse { animation: pulse 0.6s ease-in-out; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

#root { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 70px; }
.nav-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; background: var(--bg2);
  border-top: 1px solid var(--glass-border); display: flex; z-index: 100;
  padding: 4px 0; padding-bottom: env(safe-area-inset-bottom, 4px);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 8px 2px; font-size: 9px; color: var(--text3); transition: color 0.2s; gap: 2px;
}
.nav-btn.active { color: var(--amber); }
.nav-btn .nav-icon { font-size: 22px; }
.card {
  background: var(--bg2); border-radius: var(--radius); padding: 20px;
  border: 1px solid var(--glass-border); margin-bottom: 12px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: var(--shadow);
}
.card-glow { box-shadow: var(--glow-amber); border-color: rgba(240,168,48,0.25); }
.page { padding: 16px; animation: fadeIn 0.3s ease-out; }
.page-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
.btn {
  padding: 12px 24px; border-radius: var(--radius); font-weight: 600;
  font-size: 15px; transition: all 0.2s; display: inline-flex;
  align-items: center; gap: 8px; justify-content: center;
}
.btn-primary { background: var(--amber); color: #000; }
.btn-primary:hover { background: var(--amber-light); }
.btn-secondary { background: var(--bg3); color: var(--text); }
.btn-secondary:hover { background: var(--bg4); }
.btn-full { width: 100%; }
.btn-sm { padding: 8px 16px; font-size: 13px; }

.study-card {
  background: var(--bg2); border-radius: 20px; min-height: 380px;
  border: 1px solid var(--glass-border); overflow: hidden; position: relative;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.05);
}
.study-card-inner {
  padding: 28px 20px; display: flex; flex-direction: column;
  align-items: center; gap: 14px;
}
.kanji-large { font-size: 80px; font-weight: 900; line-height: 1.2; text-shadow: 0 0 40px rgba(240,168,48,0.2); }
.kanji-medium { font-size: 48px; font-weight: 700; }
.mnemonic-box {
  background: linear-gradient(135deg, rgba(240,168,48,0.08) 0%, rgba(171,71,188,0.06) 100%);
  border: 1px solid rgba(240,168,48,0.15); border-radius: 12px;
  padding: 12px 16px; margin-top: 10px; text-align: right;
}
.mnemonic-box .mnemonic-label { font-size: 11px; color: var(--amber); font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
.mnemonic-box .mnemonic-text { font-size: 13px; color: var(--text2); line-height: 1.5; direction: ltr; text-align: left; }
.tip-card {
  background: linear-gradient(135deg, rgba(66,165,245,0.08) 0%, rgba(171,71,188,0.06) 100%);
  border: 1px solid rgba(66,165,245,0.15); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px; backdrop-filter: blur(10px);
}
.tip-card .tip-icon { font-size: 24px; margin-bottom: 8px; }
.tip-card .tip-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; color: var(--blue); }
.tip-card .tip-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
.tips-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
.strategy-card {
  background: var(--bg2); border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 16px; backdrop-filter: blur(20px); transition: all 0.3s;
}
.strategy-card:hover { border-color: rgba(240,168,48,0.3); transform: translateY(-2px); }
.reading-text { font-size: 22px; color: var(--amber); }
.meaning-text { font-size: 17px; }
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.rating-btns { display: flex; gap: 8px; padding: 12px 16px; }
.rating-btn {
  flex: 1; padding: 10px 4px; border-radius: 12px; font-size: 12px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  border: 1px solid var(--glass-border); transition: all 0.2s;
  backdrop-filter: blur(10px); background: var(--glass);
}
.rating-btn:hover { transform: translateY(-3px); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
.rating-btn .interval { font-size: 10px; opacity: 0.7; }

.explorer-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
}
.explorer-cell {
  aspect-ratio: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; border-radius: 12px;
  background: var(--bg2); border: 1px solid var(--glass-border); cursor: pointer;
  transition: all 0.25s; font-size: 26px; padding: 4px 2px; gap: 1px;
  position: relative; overflow: hidden; backdrop-filter: blur(10px);
}
.explorer-cell:hover { border-color: var(--amber); transform: scale(1.05); box-shadow: 0 0 16px rgba(240,168,48,0.15); }
.explorer-cell .cell-reading { font-size: 8px; color: var(--amber); opacity: 0.8; font-family: 'Noto Sans JP', sans-serif; direction: ltr; }
.explorer-cell .cell-sub { font-size: 8px; color: var(--text3); line-height: 1; }
.explorer-cell .cell-stage-dot { position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; border-radius: 50%; }

.quiz-setup { text-align: center; padding: 20px 0; }
.quiz-setup-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
.size-options { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 16px 0; }
.size-option {
  padding: 12px 20px; border-radius: 12px; border: 2px solid var(--bg3);
  background: var(--bg2); cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  min-width: 70px;
}
.size-option:hover { border-color: var(--amber); }
.size-option.selected { border-color: var(--amber); background: rgba(240,168,48,0.15); }
.size-option .size-num { font-size: 22px; font-weight: 700; color: var(--amber); }
.size-option .size-label { font-size: 11px; color: var(--text2); }

.tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
.tab {
  padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
  background: var(--bg3); color: var(--text2); transition: all 0.2s;
}
.tab.active { background: var(--amber); color: #000; }

.search-box {
  width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--bg3);
  background: var(--bg2); color: var(--text); font-size: 14px; margin-bottom: 12px;
}
.search-box::placeholder { color: var(--text3); }

.progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
.stat-label { color: var(--text2); font-size: 14px; }
.stat-value { font-weight: 700; font-size: 16px; }

.toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
.toggle-switch {
  width: 44px; height: 24px; border-radius: 12px; background: var(--bg3);
  position: relative; cursor: pointer; transition: background 0.3s;
}
.toggle-switch.on { background: var(--amber); }
.toggle-switch::after {
  content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%;
  background: white; top: 2px; left: 2px; transition: transform 0.3s;
}
.toggle-switch.on::after { transform: translateX(20px); }

.chip {
  display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px;
  border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer;
  border: 2px solid var(--bg3); transition: all 0.2s;
}
.chip.selected { border-color: var(--amber); background: rgba(240,168,48,0.15); }

.mc-option {
  padding: 14px; border-radius: 10px; border: 2px solid var(--bg3);
  margin-bottom: 8px; cursor: pointer; transition: all 0.2s; font-size: 15px;
}
.mc-option:hover { border-color: var(--amber); }
.mc-option.correct { border-color: var(--green); background: rgba(76,175,80,0.15); }
.mc-option.wrong { border-color: var(--red); background: rgba(239,83,80,0.15); }

.typing-input {
  width: 100%; padding: 14px; border-radius: 10px; border: 2px solid var(--bg3);
  background: var(--bg); color: var(--text); font-size: 18px; text-align: center;
  direction: ltr;
}
.typing-input:focus { outline: none; border-color: var(--amber); }

.xp-float {
  position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
  font-size: 24px; font-weight: 700; color: var(--amber);
  animation: xpFloat 1.5s ease-out forwards; pointer-events: none; z-index: 10;
}

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--bg2); border-radius: 16px; padding: 24px; width: 100%;
  max-width: 400px; max-height: 80vh; overflow-y: auto; border: 1px solid var(--glass-border);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 16px 64px rgba(0,0,0,0.5);
}

.combo-badge {
  position: absolute; top: 12px; right: 12px; background: var(--amber);
  color: #000; padding: 4px 10px; border-radius: 20px; font-size: 12px;
  font-weight: 700;
}

.session-timer {
  position: absolute; top: 12px; left: 12px; color: var(--text3);
  font-size: 12px; font-weight: 600;
}

/* === MOBILE OPTIMIZATIONS === */
html { touch-action: manipulation; }
* { -webkit-tap-highlight-color: transparent; }
body { overscroll-behavior-y: contain; -webkit-overflow-scrolling: touch; min-height: 100dvh; }
body.modal-open { overflow: hidden; position: fixed; width: 100%; }
.nav-btn { min-height: 48px; }
.rating-btn { min-height: 48px; }
.chip { min-height: 44px; padding: 10px 14px; }
.tab { min-height: 44px; padding: 10px 14px; }
.btn:active { transform: scale(0.96); }
.rating-btn:active { transform: scale(0.95); background: var(--bg4); }
.chip:active { transform: scale(0.95); }
.mc-option:active { transform: scale(0.98); background: var(--bg3); }
.explorer-cell:active { transform: scale(0.95); }
.nav-btn:active { opacity: 0.7; }
button, .nav-bar, .chip, .tab, .rating-btn, .mc-option, .explorer-cell, .badge, .toggle-switch {
  user-select: none; -webkit-user-select: none;
}
.search-box { font-size: 16px; }
#root { padding-top: env(safe-area-inset-top, 0px); }
.nav-btn.active { position: relative; }
.nav-btn.active::before {
  content: ''; position: absolute; top: 0; left: 25%; right: 25%;
  height: 2px; background: var(--amber); border-radius: 1px;
}
.modal-overlay { align-items: flex-end; }
.modal { border-radius: 16px 16px 0 0; border-bottom: none; padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px)); animation: slideUp 0.3s ease-out; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.study-card { contain: layout style; }
@media (orientation: landscape) and (max-height: 500px) {
  .study-card { min-height: 260px; }
  .kanji-large { font-size: 56px; }
  .page { padding: 8px 16px; }
}

.heatmap-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 3px; }
.heatmap-cell { aspect-ratio: 1; border-radius: 3px; position: relative; }
.heatmap-cell:hover .heatmap-tooltip { display: block; }
.heatmap-tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--bg3); border-radius: 6px; padding: 4px 8px; font-size: 10px; white-space: nowrap; z-index: 10; }
.forecast-bar { display: flex; gap: 4px; margin-top: 8px; }
.forecast-item { flex: 1; text-align: center; padding: 8px 4px; border-radius: 8px; background: var(--bg2); border: 1px solid var(--bg3); }
.forecast-num { font-size: 18px; font-weight: 700; color: var(--amber); }
.forecast-label { font-size: 10px; color: var(--text2); }
.session-review-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--bg3); }
.speaker-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px; }
.speaker-btn:active { transform: scale(0.9); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback, useMemo} = React;

// ======================== KANJI DATABASE ========================

function getIntervalText(stage, delta) {
  const newLevel = Math.max(0, stage + delta);
  if (newLevel <= 0) return '4 דק\'';
  if (newLevel === 1) return '4 שעות';
  if (newLevel === 2) return '8 שעות';
  if (newLevel === 3) return '1 יום';

// ======================== AUDIO ========================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (type === 'flip') { osc.frequency.value = 600; gain.gain.value = 0.08; osc.type = 'sine'; }
    else if (type === 'correct') { osc.frequency.value = 800; gain.gain.value = 0.1; osc.type = 'sine'; }
    else if (type === 'wrong') { osc.frequency.value = 300; gain.gain.value = 0.1; osc.type = 'sawtooth'; }
    else if (type === 'levelup') { osc.frequency.value = 1000; gain.gain.value = 0.08; osc.type = 'sine'; }
    else { osc.frequency.value = 500; gain.gain.value = 0.06; osc.type = 'sine'; }
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

// --- Japanese TTS ---
let _jpVoice = null;
let _jpVoicesLoaded = false;

function _initJPVoice() {
  if (!window.speechSynthesis) return;
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  _jpVoicesLoaded = true;
  const jp = voices.filter(v => /^ja/.test(v.lang));
  if (!jp.length) return; // No Japanese voice on this device
  // Cross-platform: premium > local service > remote (Google on Android/ChromeOS) > any
  const novelty = /eddy|flo|grandma|grandpa|reed|rocko|sandy|shelley/i;
  _jpVoice =
    jp.find(v => /premium|enhanced/i.test(v.name)) ||
    jp.find(v => v.localService && !novelty.test(v.name)) ||
    jp.find(v => v.localService) ||
    jp.find(v => !novelty.test(v.name)) ||
    jp[0];
}

if (window.speechSynthesis) {
  _initJPVoice();
  window.speechSynthesis.onvoiceschanged = _initJPVoice;
}

function speakJP(text) {
  if (!text || !window.speechSynthesis) return;
  const clean = text.replace(/[。\.]/g, '').trim();
  if (!clean) return;
  if (!_jpVoicesLoaded) _initJPVoice();

  const synth = window.speechSynthesis;
  const wasBusy = synth.speaking || synth.pending;

  const makeU = () => {
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = 'ja-JP';
    u.rate = 0.85;
    u.volume = 1.0;
    if (_jpVoice) u.voice = _jpVoice;
    u.onerror = e => console.warn('[TTS] error:', e.error, clean);
    return u;
  };

  if (wasBusy) {
    // Chrome: speak() first to keep user-activation alive, then cancel old speech
    synth.speak(makeU());
    synth.cancel();
    synth.speak(makeU());
  } else {
    synth.speak(makeU());
  }
}

function haptic(style = 'light') {
  if (navigator.vibrate) {
    if (style === 'light') navigator.vibrate(10);
    else if (style === 'medium') navigator.vibrate(20);
    else navigator.vibrate([30, 10, 30]);
  }
}

function loadData(key, def) {
  try { const d = localStorage.getItem('kanji_' + key); return d ? JSON.parse(d) : def; } catch { return def; }

function saveData(key, val) {

}

  const [sessionTime, setSessionTime] = useState(0);

  const [lastAction, setLastAction] = useState(null);

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); saveData('theme', theme); }, [theme]);

      if (diff > 1) {

// ======================== PROGRESS RING ========================
function ProgressRing({progress, size=80, stroke=6}) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - Math.min(progress, 1) * circ;
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg3)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--amber)" strokeWidth={stroke}
              strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
              style={{transition:'stroke-dashoffset 0.5s ease'}} />
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central" fill="var(--text)"
            fontSize={size*0.22} fontWeight="700" style={{transform:'rotate(90deg)', transformOrigin:'center'}}>
        {Math.round(progress * 100)}%
      </text>
    </svg>
  );
}

function StudyPage({kanji, srsData, setSrsData, stats, setStats, quizMode, setQuizMode, doSound, sessionActive, setSessionActive, lastAction, setLastAction}) {
  const [phase, setPhase] = useState('setup'); // 'setup' | 'active' | 'done'
  const [quizSize, setQuizSize] = useState(() => loadData('quizSize', 20));
  const [studyFilter, setStudyFilter] = useState('due'); // 'due' | 'new' | 'weak' | 'all'
  const [currentIndex, setCurrentIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [combo, setCombo] = useState(0);
  const [xpFloat, setXpFloat] = useState(null);
  const [mcOptions, setMcOptions] = useState([]);
  const [mcAnswer, setMcAnswer] = useState(null);
  const [typingVal, setTypingVal] = useState('');
  const [typingResult, setTypingResult] = useState(null);
  const [sessionStats, setSessionStats] = useState({correct:0, wrong:0, xp:0});
  const inputRef = useRef(null);

  const allDue = useMemo(() => {
    const now = new Date();
    return kanji.filter(k => {
      const d = srsData[k.c];
      if (!d) return true;
      return !d.nextReview || new Date(d.nextReview) <= now;
    });
  }, [kanji, srsData]);

  const newKanji = useMemo(() => kanji.filter(k => !srsData[k.c] || srsData[k.c].level === 0), [kanji, srsData]);
  const weakKanji = useMemo(() => kanji.filter(k => {
    const d = srsData[k.c];
    return d && d.level >= 1 && d.level <= 3;
  }), [kanji, srsData]);

  const dueKanji = useMemo(() => {
    let pool;
    if (studyFilter === 'new') pool = newKanji;
    else if (studyFilter === 'weak') pool = weakKanji;
    else if (studyFilter === 'all') pool = kanji;
    else pool = allDue;
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    return quizSize === 0 ? shuffled : shuffled.slice(0, quizSize);
  }, [studyFilter, quizSize, allDue, newKanji, weakKanji, kanji]);

  const current = phase === 'active' ? dueKanji[currentIndex] : null;

  // === ALL HOOKS MUST BE ABOVE ALL RETURNS ===

  // Start session timer
  useEffect(() => {
    if (phase === 'active' && !sessionActive && dueKanji.length > 0) setSessionActive(true);
  }, [phase]);

  // no-op placeholder to keep hook count stable
  useEffect(() => {}, [phase]);

  // Generate MC options
  useEffect(() => {
    if (quizMode === 'mc' && current) {
      const correct = current;
      const others = kanji.filter(k => k.c !== correct.c).sort(() => Math.random() - 0.5).slice(0, 3);
      const opts = [correct, ...others].sort(() => Math.random() - 0.5);
      setMcOptions(opts);
      setMcAnswer(null);
    }
    if (quizMode === 'typing') {
      setTypingVal('');
      setTypingResult(null);
    }
  }, [currentIndex, quizMode, current?.c]);

  // Keyboard shortcuts - use ref to avoid dependency on handleRate
  const handleRateRef = useRef(null);
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') {
        e.preventDefault();
        setFlipped(prev => { if (!prev) { doSound('flip'); return true; } return prev; });
      }
      if (['Digit1','Digit2','Digit3','Digit4'].includes(e.code)) {
        const idx = parseInt(e.code.replace('Digit','')) - 1;
        if (idx >= 0 && idx < 4 && handleRateRef.current) handleRateRef.current(idx);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  // === END HOOKS === Now safe to have conditional returns ===

  // Setup screen
  if (phase === 'setup') {
    const sizes = [
      {n: 5, l: 'מהיר'},
      {n: 10, l: 'קצר'},
      {n: 20, l: 'רגיל'},

      {k:'due', l:'ממתינים', count: allDue.length, icon:'⏰'},
      {k:'new', l:'חדשים', count: newKanji.length, icon:'🆕'},
      {k:'weak', l:'חלשים', count: weakKanji.length, icon:'💪'},
      {k:'all', l:'הכל', count: kanji.length, icon:'📚'},
    ];
    const effectiveCount = studyFilter === 'new' ? newKanji.length :
                           studyFilter === 'weak' ? weakKanji.length :
                           studyFilter === 'all' ? kanji.length : allDue.length;
    const actualSize = quizSize === 0 ? effectiveCount : Math.min(quizSize, effectiveCount);
    return (
      <div className="page quiz-setup">
        <div className="quiz-setup-title">⚙️ הגדרות מבחן</div>

        <div className="card" style={{textAlign:'right'}}>

        </div>

        <div className="card" style={{textAlign:'right'}}>
          <div style={{fontWeight:600, marginBottom:10}}>כמה קאנג'י?</div>
          <div className="size-options">
            {sizes.map(s => (
              <div key={s.n} className={`size-option ${quizSize === s.n ? 'selected' : ''}`}
                   onClick={() => { setQuizSize(s.n); saveData('quizSize', s.n); }}>
                <span className="size-num">{s.n === 0 ? '∞' : s.n}</span>
                <span className="size-label">{s.l}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="card" style={{textAlign:'right'}}>
          <div style={{fontWeight:600, marginBottom:10}}>מצב מבחן</div>
          <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
            {[{k:'flashcard',l:'🃏 כרטיסיות'},{k:'mc',l:'📝 רב-ברירה'},{k:'typing',l:'⌨️ הקלדה'}].map(m => (
              <button key={m.k} className={`chip ${quizMode === m.k ? 'selected' : ''}`}
                      onClick={() => { setQuizMode(m.k); saveData('quizMode', m.k); }}>{m.l}</button>
            ))}
          </div>
        </div>

        <div style={{marginTop:20, padding:'16px', background:'var(--bg2)', borderRadius:12, border:'1px solid var(--bg3)'}}>
          <div style={{fontSize:36, fontWeight:900, color:'var(--amber)'}}>{actualSize}</div>
          <div style={{fontSize:14, color:'var(--text2)'}}>קאנג'י בסשן הזה</div>
        </div>

        <button className="btn btn-primary btn-full" style={{fontSize:18, padding:16, marginTop:16}}
                disabled={actualSize === 0}
                onClick={() => { setPhase('active'); setCurrentIndex(0); setCombo(0); setSessionStats({correct:0,wrong:0,xp:0}); }}>
          🚀 התחל מבחן
        </button>
      </div>
    );
  }

  // Done screen
  if (phase === 'done') {
    const total = sessionStats.correct + sessionStats.wrong;
    const accuracy = total > 0 ? Math.round((sessionStats.correct / total) * 100) : 0;
    return (
      <div className="page" style={{textAlign:'center', paddingTop:40}}>
        <div style={{fontSize:64, marginBottom:16}}>🎉</div>
        <div style={{fontSize:24, fontWeight:700, marginBottom:20}}>סיימת!</div>
        <div className="card" style={{textAlign:'center'}}>
          <div style={{display:'flex', justifyContent:'space-around', marginBottom:16}}>
            <div><div style={{fontSize:28, fontWeight:700, color:'var(--green)'}}>{sessionStats.correct}</div><div style={{fontSize:12, color:'var(--text2)'}}>נכון</div></div>
            <div><div style={{fontSize:28, fontWeight:700, color:'var(--red)'}}>{sessionStats.wrong}</div><div style={{fontSize:12, color:'var(--text2)'}}>שגוי</div></div>
            <div><div style={{fontSize:28, fontWeight:700, color:'var(--amber)'}}>{sessionStats.xp}</div><div style={{fontSize:12, color:'var(--text2)'}}>XP</div></div>
          </div>
          <div className="progress-bar" style={{height:8, marginBottom:8}}>
            <div className="progress-fill" style={{width:`${accuracy}%`, background: accuracy >= 80 ? 'var(--green)' : accuracy >= 50 ? 'var(--orange)' : 'var(--red)'}} />
          </div>
          <div style={{fontSize:14, color:'var(--text2)'}}>{accuracy}% דיוק</div>
        </div>
        <div style={{display:'flex', gap:8, marginTop:16}}>
          <button className="btn btn-secondary btn-full" onClick={() => setPhase('setup')}>🔄 מבחן חדש</button>
        </div>
      </div>
    );
  }

  const handleRate = (ratingIdx) => {
    if (!current) return;
    const rating = INTERVALS[ratingIdx];
    const prev = srsData[current.c] || {level: 0, reviews: 0};
    const newLevel = Math.max(0, Math.min(9, prev.level + rating.delta));
    const stage = getStage(newLevel);

    // Calculate next review
    let hours;
    if (newLevel <= 0) hours = 0.07;
    else if (newLevel === 1) hours = 4;
    else if (newLevel === 2) hours = 8;
    else if (newLevel === 3) hours = 24;
    else if (newLevel === 4) hours = 48;
    else if (newLevel === 5) hours = 168;
    else if (newLevel === 6) hours = 336;
    else if (newLevel === 7) hours = 720;
    else if (newLevel === 8) hours = 2880;
    else hours = 999999;

    const nextReview = new Date(Date.now() + hours * 3600000).toISOString();

    // Save undo
    setLastAction({char: current.c, prevSrs: prev, prevStats: {...stats}});

    // Combo & XP
    const isGood = ratingIdx >= 2;
    const newCombo = isGood ? combo + 1 : 0;
    const multiplier = Math.min(1 + Math.floor(newCombo / 3) * 0.5, 3);
    const baseXP = ratingIdx === 3 ? 15 : ratingIdx === 2 ? 10 : ratingIdx === 1 ? 5 : 2;
    const earnedXP = Math.round(baseXP * multiplier);

    if (isGood) doSound('correct');
    else doSound('wrong');
    if (newLevel > prev.level && newLevel >= 5) doSound('levelup');

    setCombo(newCombo);
    setXpFloat(earnedXP);
    setTimeout(() => setXpFloat(null), 1500);

    setSrsData(d => ({...d, [current.c]: {level: newLevel, reviews: (prev.reviews||0)+1, nextReview, lastReview: new Date().toISOString()}}));

    const today = new Date().toDateString();
    setStats(s => ({
      ...s,
      totalReviews: s.totalReviews + 1,
      totalXP: s.totalXP + earnedXP,
      dailyDone: s.dailyDone + 1,
      lastDate: today,
      streak: s.lastDate === today ? s.streak : (s.streak + 1),
    }));

    // Track session
    setSessionStats(ss => ({
      ...ss,
      correct: isGood ? ss.correct + 1 : ss.correct,
      wrong: !isGood ? ss.wrong + 1 : ss.wrong,
      xp: ss.xp + earnedXP,
    }));

    // Next card or done
    setFlipped(false);
    if (currentIndex < dueKanji.length - 1) {
      setCurrentIndex(i => i + 1);
    } else {
      setTimeout(() => { setPhase('done'); setSessionActive(false); }, 300);
    }
  };

  const handleMCSelect = (k) => {
    if (mcAnswer) return;
    setMcAnswer(k.c);
    const isCorrect = k.c === current.c;
    if (isCorrect) {
      doSound('correct');
      setTimeout(() => handleRate(2), 800);
    } else {
      doSound('wrong');
      setTimeout(() => handleRate(0), 1200);
    }
  };

  const handleTypingSubmit = (e) => {
    e.preventDefault();
    if (!current || typingResult !== null) return;
    const val = typingVal.trim().toLowerCase();
    const correct = current.en.toLowerCase();
    const isCorrect = val === correct || current.he === val;
    setTypingResult(isCorrect);
    if (isCorrect) {
      doSound('correct');
      setTimeout(() => handleRate(2), 800);
    } else {
      doSound('wrong');
      setTimeout(() => handleRate(0), 1200);
    }
  };

  const handleUndo = () => {
    if (!lastAction) return;
    setSrsData(d => {
      const nd = {...d};
      if (lastAction.prevSrs.level === 0 && !lastAction.prevSrs.reviews) {
        delete nd[lastAction.char];
      } else {
        nd[lastAction.char] = lastAction.prevSrs;
      }
      return nd;
    });
    setStats(lastAction.prevStats);
    setCurrentIndex(i => Math.max(0, i - 1));
    setFlipped(false);
    setLastAction(null);
  };

  // Update ref for keyboard shortcuts
  handleRateRef.current = handleRate;

  if (phase === 'active' && (!current || currentIndex >= dueKanji.length)) {
    return (
      <div className="page" style={{textAlign:'center', paddingTop:60}}>
        <div style={{fontSize:64, marginBottom:20}}>✅</div>
        <div style={{fontSize:22, fontWeight:700, marginBottom:8}}>אין קאנג'י זמינים!</div>
        <div style={{color:'var(--text2)', marginBottom:20}}>שנה את הסינון או חזור מאוחר יותר.</div>
        <button className="btn btn-primary" onClick={() => setPhase('setup')}>חזור להגדרות</button>
      </div>
    );
  }

  const curSrs = srsData[current.c] || {level:0};
  const stage = getStage(curSrs.level);

  return (
    <div className="page">
      {/* Top bar with back, progress, undo */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
        <button onClick={() => { setPhase('setup'); setSessionActive(false); }}
                style={{fontSize:13, color:'var(--text2)', display:'flex', alignItems:'center', gap:4}}>
          ← חזור
        </button>
        <span style={{fontSize:13, color:'var(--text2)'}}>{currentIndex + 1} / {dueKanji.length}</span>
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          {combo > 2 && <span style={{fontSize:12, color:'var(--amber)', fontWeight:700}}>x{combo}</span>}
          {lastAction && <button onClick={handleUndo} style={{color:'var(--amber)', fontSize:12, fontWeight:600}}>↩ בטל</button>}
        </div>
      </div>
      <div className="progress-bar" style={{marginBottom:12}}>
        <div className="progress-fill" style={{width:`${(currentIndex/dueKanji.length)*100}%`, background:'var(--amber)'}} />
      </div>

      {/* Card */}
      <div className="study-card">
        {combo > 2 && <div className="combo-badge" style={{animation:'streak 0.5s ease'}}>x{combo} קומבו</div>}
        {xpFloat && <div className="xp-float">+{xpFloat} XP</div>}
        <div className="study-card-inner">
          <div className="badge" style={{background:stage.color+'33', color:stage.color}}>{stage.name}</div>
          <div className="jp kanji-large" onClick={() => speakJP(current.c)}
               style={{cursor:'pointer'}} title="לחץ להשמעה">{current.c}</div>
          <button className="speaker-btn" onClick={() => speakJP(current.c)} title="השמע">🔊</button>
          <div style={{fontSize:12, color:'var(--text3)'}}>שבצים: {current.s} | {current.j}</div>

          {quizMode === 'flashcard' && !flipped && (
            <button className="btn btn-primary" onClick={() => { setFlipped(true); doSound('flip'); }}
                    style={{marginTop:20}}>
              הפוך (רווח)
            </button>
          )}

          {quizMode === 'flashcard' && flipped && (
            <div className="flip-in" style={{width:'100%', textAlign:'center'}}>
              <div className="meaning-text" style={{marginBottom:6}}>{current.he}</div>
              <div className="meaning-text ltr" style={{color:'var(--text2)', marginBottom:6}}>{current.en}</div>
              <div className="ltr" style={{marginBottom:4}}>
                {current.on.length > 0 && <span className="jp" style={{color:'var(--amber)'}}>音: {current.on.join('、')}</span>}
              </div>
              <div className="ltr" style={{marginBottom:8}}>
                {current.kun.length > 0 && <span className="jp" style={{color:'var(--green)'}}>訓: {current.kun.join('、')}</span>}
              </div>
              {current.v && current.v[0] && (
                <div style={{background:'var(--bg3)', borderRadius:8, padding:10, marginTop:8, cursor:'pointer'}}
                     onClick={() => speakJP(current.v[0].w)}>
                  <div className="jp ltr" style={{fontSize:18}}>{current.v[0].w} 🔊</div>
                  <div className="jp ltr" style={{fontSize:14, color:'var(--amber)'}}>{current.v[0].r}</div>
                  <div style={{fontSize:13}}>{current.v[0].he}</div>
                </div>
              )}
              {current.m && (
                <div className="mnemonic-box" style={{width:'100%'}}>
                  <div className="mnemonic-label">💡 טיפ לזכירה</div>
                  <div className="mnemonic-text">{current.m}</div>
                </div>
              )}
            </div>
          )}

          {quizMode === 'mc' && (
            <div style={{width:'100%', marginTop:12}}>
              <div style={{fontSize:14, color:'var(--text2)', marginBottom:8, textAlign:'center'}}>מה המשמעות?</div>
              {mcOptions.map(opt => {
                let cls = 'mc-option';
                if (mcAnswer) {
                  if (opt.c === current.c) cls += ' correct';
                  else if (opt.c === mcAnswer) cls += ' wrong';
                }
                return (
                  <div key={opt.c} className={cls} onClick={() => handleMCSelect(opt)}>
                    {opt.he} ({opt.en})
                  </div>
                );
              })}
            </div>
          )}

          {quizMode === 'typing' && (
            <div style={{width:'100%', marginTop:12}}>
              <div style={{fontSize:14, color:'var(--text2)', marginBottom:8, textAlign:'center'}}>הקלד את המשמעות באנגלית</div>
              <form onSubmit={handleTypingSubmit}>
                <input ref={inputRef} className="typing-input" value={typingVal}
                       onChange={e => setTypingVal(e.target.value)} placeholder="Meaning in English..."
                       disabled={typingResult !== null} autoFocus />
                {typingResult === null && (
                  <button type="submit" className="btn btn-primary btn-full" style={{marginTop:8}}>בדוק</button>
                )}
                {typingResult !== null && (
                  <div style={{textAlign:'center', marginTop:12, fontSize:16, fontWeight:600,
                               color: typingResult ? 'var(--green)' : 'var(--red)'}}>
                    {typingResult ? 'נכון!' : `לא נכון. התשובה: ${current.en} (${current.he})`}
                  </div>
                )}
              </form>
            </div>
          )}
        </div>

        {/* Rating buttons - show for flashcard after flip, or wait for MC/typing auto-advance */}
        {quizMode === 'flashcard' && flipped && (
          <div className="rating-btns">
            {INTERVALS.map((iv, i) => (
              <button key={i} className="rating-btn" onClick={() => handleRate(i)}
                      style={{borderColor: i===0?'var(--red)':i===1?'var(--orange)':i===2?'var(--green)':'var(--blue)'}}>
                <span>{iv.label}</span>
                <span className="interval">{getIntervalText(curSrs.level, iv.delta)}</span>
                <span style={{fontSize:10, color:'var(--text3)'}}>{i+1}</span>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ======================== EXPLORE PAGE ========================
function ExplorePage({selectedLevels, srsData}) {
  const [activeTab, setActiveTab] = useState('N5');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);

  const filtered = useMemo(() => {
    let list = KANJI.filter(k => k.j === activeTab);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(k =>
        k.c.includes(q) || k.en.toLowerCase().includes(q) || k.he.includes(q) ||
        k.on.some(r => r.includes(q)) || k.kun.some(r => r.includes(q))
      );
    }
    return list;
  }, [activeTab, search]);

  return (
    <div className="page">
      <div className="page-title">סייר קאנג'י</div>
      <div className="tabs">
        {['N5','N4','N3','N2','N1'].map(lv => (
          <button key={lv} className={`tab ${activeTab === lv ? 'active' : ''}`}
                  onClick={() => setActiveTab(lv)}>
            {lv} ({KANJI.filter(k=>k.j===lv).length})
          </button>
        ))}
      </div>
      <input className="search-box" placeholder="חיפוש קאנג'י, משמעות, קריאה..."
             value={search} onChange={e => setSearch(e.target.value)} />
      <div className="explorer-grid">
        {filtered.map(k => {
          const d = srsData[k.c];
          const stage = getStage(d ? d.level : 0);
          const mainReading = k.kun.length > 0 ? k.kun[0].replace('.','') : (k.on.length > 0 ? k.on[0] : '');
          return (
            <div key={k.c} className="explorer-cell" onClick={() => setSelected(k)}
                 style={{borderColor: stage.color + '66'}}>
              {d && d.level > 0 && <div className="cell-stage-dot" style={{background: stage.color}} />}
              <span className="cell-reading">{mainReading}</span>
              <span className="jp" style={{lineHeight:1}}>{k.c}</span>
              <span className="cell-sub">{k.he}</span>
            </div>
          );
        })}
      </div>
      {filtered.length === 0 && <div style={{textAlign:'center', color:'var(--text3)', marginTop:20}}>לא נמצאו תוצאות</div>}

      {selected && (
        <div className="modal-overlay" onClick={() => setSelected(null)}>
          <div className="modal scale-in" onClick={e => e.stopPropagation()}>
            <div style={{textAlign:'center'}}>
              <div className="jp" style={{fontSize:72, fontWeight:900, cursor:'pointer'}}
                   onClick={() => speakJP(selected.c)} title="לחץ להשמעה">{selected.c}</div>
              <button className="speaker-btn" onClick={() => speakJP(selected.c)} title="השמע">🔊</button>
              <div className="badge" style={{background:getStage((srsData[selected.c]||{level:0}).level).color+'33',
                   color:getStage((srsData[selected.c]||{level:0}).level).color, marginBottom:12}}>
                {getStage((srsData[selected.c]||{level:0}).level).name}
              </div>
              <div style={{fontSize:20, fontWeight:600, marginBottom:4}}>{selected.he}</div>
              <div className="ltr" style={{fontSize:16, color:'var(--text2)', marginBottom:12}}>{selected.en}</div>
              <div style={{display:'flex', justifyContent:'center', gap:20, marginBottom:12}}>
                {selected.on.length > 0 && (
                  <div>
                    <div style={{fontSize:11, color:'var(--text3)'}}>אוניומי</div>
                    <div className="jp ltr" style={{color:'var(--amber)', cursor:'pointer'}}
                         onClick={() => speakJP(selected.on.join('、'))}>{selected.on.join('、')}</div>
                  </div>
                )}
                {selected.kun.length > 0 && (
                  <div>
                    <div style={{fontSize:11, color:'var(--text3)'}}>קוניומי</div>
                    <div className="jp ltr" style={{color:'var(--green)', cursor:'pointer'}}
                         onClick={() => speakJP(selected.kun.join('、'))}>{selected.kun.join('、')}</div>
                  </div>
                )}
              </div>
              <div style={{fontSize:13, color:'var(--text3)'}}>שבצים: {selected.s} | רמה: {selected.j}</div>
              {selected.v && selected.v[0] && (
                <div style={{background:'var(--bg3)', borderRadius:8, padding:12, marginTop:12, cursor:'pointer'}}
                     onClick={() => speakJP(selected.v[0].w)}>
                  <div style={{fontSize:12, color:'var(--text3)', marginBottom:4}}>מילה לדוגמה 🔊</div>
                  <div className="jp ltr" style={{fontSize:20}}>{selected.v[0].w}</div>
                  <div className="jp ltr" style={{fontSize:14, color:'var(--amber)'}}>{selected.v[0].r}</div>
                  <div style={{fontSize:14}}>{selected.v[0].he} ({selected.v[0].en})</div>
                </div>

                  <div className="mnemonic-label">💡 טיפ לזכירה</div>
                  <div className="mnemonic-text">{selected.m}</div>
                </div>
              )}

            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    const g = Math.max(1, Math.min(200, parseInt(goal) || 20));
    setStats(s => ({...s, dailyGoal: g}));
    setGoal(g);
  };

  return (
    <div className="page">
      <div className="page-title">הגדרות</div>
      <div className="card">
        <div style={{fontWeight:600, marginBottom:10}}>רמות פעילות</div>
        <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
          {['N5','N4','N3','N2','N1'].map(lv => (
            <button key={lv} className={`chip ${selectedLevels.includes(lv) ? 'selected' : ''}`}
                    onClick={() => toggleLevel(lv)}>
              {lv} ({KANJI.filter(k=>k.j===lv).length})
            </button>
          ))}
        </div>
      </div>

      <div className="card">
        <div style={{fontWeight:600, marginBottom:10}}>מצב תרגול</div>
        <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
          {[{k:'flashcard',l:'כרטיסיות'},{k:'mc',l:'רב-ברירה'},{k:'typing',l:'הקלדה'}].map(m => (
            <button key={m.k} className={`chip ${quizMode === m.k ? 'selected' : ''}`}
                    onClick={() => setQuizMode(m.k)}>{m.l}</button>
          ))}
        </div>
      </div>

      <div className="card">
        <div style={{fontWeight:600, marginBottom:10}}>יעד יומי</div>
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          <input type="number" value={goal} onChange={e => setGoal(e.target.value)}
                 style={{width:80, padding:'8px 12px', borderRadius:8, border:'1px solid var(--bg3)',
                         background:'var(--bg)', color:'var(--text)', fontSize:16, textAlign:'center'}} />
          <span style={{fontSize:14, color:'var(--text2)'}}>חזרות ביום</span>
          <button className="btn btn-sm btn-primary" onClick={applyGoal}>שמור</button>
        </div>
      </div>

      <div className="card">
        <div style={{fontWeight:600, marginBottom:10, color:'var(--red)'}}>איפוס</div>
        <button className="btn btn-sm btn-secondary" onClick={() => {
          if (confirm('לאפס את כל ההתקדמות?')) {
            localStorage.clear();
            location.reload();
          }
        }}>
          איפוס כל הנתונים
        </button>
      </div>

      <div className="card">
        <div style={{fontWeight:600, marginBottom:10}}>קיצורי מקלדת</div>
        <div style={{fontSize:13, color:'var(--text2)'}}>
          <div style={{marginBottom:4}}>רווח — הפוך כרטיס</div>
          <div style={{marginBottom:4}}>1 — שוב (Again)</div>
          <div style={{marginBottom:4}}>2 — קשה (Hard)</div>
          <div style={{marginBottom:4}}>3 — טוב (Good)</div>
          <div>4 — קל (Easy)</div>
        </div>
      </div>
    </div>
  );
}

// ======================== STATS PAGE ========================
function StatsPage({stats, srsData}) {
  const allEntries = Object.entries(srsData);
  const totalLearned = allEntries.filter(([,d]) => d.level >= 1).length;
  const mastered = allEntries.filter(([,d]) => d.level >= 7).length;
  const burned = allEntries.filter(([,d]) => d.level >= 9).length;

  const stageDistribution = {};
  SRS_STAGES.forEach(s => stageDistribution[s.nameEn] = 0);
  allEntries.forEach(([,d]) => {
    const stage = getStage(d.level);
    stageDistribution[stage.nameEn]++;
  });
  // Add unseen
  stageDistribution['New'] = KANJI.length - allEntries.length + (stageDistribution['New'] || 0);

  const maxBar = Math.max(1, ...Object.values(stageDistribution));

  return (
    <div className="page">
      <div className="page-title">סטטיסטיקה</div>

      <div className="card card-glow" style={{textAlign:'center'}}>
        <div style={{fontSize:48, fontWeight:900, color:'var(--amber)'}}>{stats.totalXP}</div>
        <div style={{fontSize:14, color:'var(--text2)'}}>XP כולל</div>
      </div>

      <div className="card">
        <div className="stat-row">
          <span className="stat-label">סה"כ חזרות</span>
          <span className="stat-value">{stats.totalReviews}</span>
        </div>
        <div className="stat-row">
          <span className="stat-label">נלמדו</span>
          <span className="stat-value">{totalLearned}</span>
        </div>
        <div className="stat-row">
          <span className="stat-label">שולטו (מאסטר+)</span>
          <span className="stat-value">{mastered}</span>
        </div>
        <div className="stat-row">
          <span className="stat-label">נצרבו</span>
          <span className="stat-value" style={{color:'var(--amber)'}}>{burned}</span>
        </div>
        <div className="stat-row">
          <span className="stat-label">רצף ימים</span>
          <span className="stat-value">{stats.streak}</span>
        </div>
        <div className="stat-row">
          <span className="stat-label">יעד יומי</span>
          <span className="stat-value">{stats.dailyDone}/{stats.dailyGoal}</span>
        </div>
      </div>

      <div className="card">
        <div style={{fontWeight:600, marginBottom:12}}>התפלגות שלבים</div>
        {SRS_STAGES.map(s => (
          <div key={s.nameEn} style={{marginBottom:8}}>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:4}}>
              <span style={{color:s.color}}>{s.name}</span>
              <span style={{fontWeight:600}}>{stageDistribution[s.nameEn]}</span>
            </div>
            <div className="progress-bar">
              <div className="progress-fill" style={{width:`${(stageDistribution[s.nameEn]/maxBar)*100}%`, background:s.color}} />
            </div>
          </div>
        ))}
      </div>

      <div className="card">
        <div style={{fontWeight:600, marginBottom:8}}>התקדמות לפי רמה</div>
        {['N5','N4','N3','N2','N1'].map(lv => {
          const total = KANJI.filter(k => k.j === lv).length;
          const learned = KANJI.filter(k => k.j === lv && srsData[k.c] && srsData[k.c].level >= 1).length;
          return (
            <div key={lv} style={{marginBottom:8}}>
              <div style={{display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:4}}>
                <span>{lv}</span>
                <span>{learned}/{total}</span>
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{width:`${(learned/total)*100}%`, background:'var(--amber)'}} />
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
